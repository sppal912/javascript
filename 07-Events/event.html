<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html events</title>
    <style>
        .container{
            width: 80%;
            margin: auto;
        }
        .heading{
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .images{
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body style="background-color: black; color: whitesmoke;">
    <div class="container">
        <h1 class="heading">amazing images</h1>
        <ul class="images">

            <li class="img">
                <img id="river" src="https://images.pexels.com/photos/37453762/pexels-photo-37453762/free-photo-of-aerial-view-of-istanbul-s-scenic-forest-and-lake.jpeg" alt="river" width="200px" height="150px">
            </li>

            <li class="img">
                <img id="flower" src="https://images.pexels.com/photos/31092817/pexels-photo-31092817/free-photo-of-vibrant-purple-flower-amidst-greenery-in-chittagong.png?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="flower" width="200px" height="150px">
            </li>

            <li class="img">
                <img id="pata" src="https://images.pexels.com/photos/36678152/pexels-photo-36678152/free-photo-of-vibrant-green-leaves-with-dew-in-a-forest-setting.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="asthatic pata photo" width="200px" height="150px">
            </li>

            <li class="img">
                <img id="nime" src="https://images.pexels.com/photos/37415986/pexels-photo-37415986/free-photo-of-vibrant-green-leaves-in-natural-pattern.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="nime photo" width="200px" height="150px">
            </li>

            <li class="link"><a href="https://www.pexels.com/" target="_blank">Visit Pexels</a></li>
            
        </ul>
    </div>
    
    <script src="event.js"></script>
</body>
</html>
